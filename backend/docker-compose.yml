services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bleed:bleed@db:5432/bleed
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bleed
      POSTGRES_PASSWORD: bleed
      POSTGRES_DB: bleed
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
