name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bleedcore:
    name: BleedCore (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        working-directory: BleedCore
        run: swift test

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: pip install -e '.[dev]'
      - name: Run tests
        working-directory: backend
        run: pytest
